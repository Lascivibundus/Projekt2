<!DOCTYPE html>
<html>
<head>
  <title>Squares [PERFECT]</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      overflow: hidden;
      font-family: monospace;
    }
    canvas {
      border: 3px solid #0f0;
      background: #000;
      display: block;
      margin: 0 auto;
      cursor: none;
    }
    #info {
      color: #0f0;
      text-align: center;
      margin: 10px 0;
    }
  </style>
</head>
<body tabindex="0">
  <canvas id="canvas" width="800" height="600"></canvas>
  <div id="info">Click → WASD = SMOOTH movement!</div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const socket = io();
    
    const players = new Map();
    let myPlayer = null;
    let keys = {};
    
    // INPUT - Global capture
    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
    });
    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });
    canvas.addEventListener('click', () => {
      canvas.focus();
      window.focus();
    });
    
    function update() {
      if (!myPlayer) return;
      
      // Calculate movement
      const speed = 4;
      let dx = 0, dy = 0;
      if (keys['d']) dx = speed;
      if (keys['a']) dx = -speed;
      if (keys['s']) dy = speed;
      if (keys['w']) dy = -speed;
      
      // Send to server immediately
      if (dx || dy) {
        socket.emit('move', { x: dx, y: dy });
      }
    }
    
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, 800, 600);
      
      players.forEach(player => {
        const isMe = player.id === myPlayer?.id;
        const size = isMe ? 35 : 28;
        const glow = isMe ? 60 : 25;
        
        ctx.save();
        ctx.shadowColor = player.color || '#0f0';
        ctx.shadowBlur = glow;
        ctx.fillStyle = isMe ? '#0f0' : (player.color || '#666');
        ctx.fillRect(player.x-size/2, player.y-size/2, size, size);
        ctx.restore();
        
        ctx.fillStyle = isMe ? '#fff' : '#aaa';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(player.id.slice(-4), player.x, player.y-size/2-5);
      });
      
      // Stats
      ctx.fillStyle = '#0f0';
      ctx.font = '12px monospace';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(`Players: ${players.size}`, 10, 20);
      if (myPlayer) ctx.fillText(`You: ${myPlayer.id.slice(-4)}`, 10, 35);
    }
    
    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }
    
    // NETWORK - Accept ALL server updates
    socket.on('init', (me, allPlayers) => {
      myPlayer = me;
      allPlayers.forEach(p => players.set(p.id, p));
      console.log('✅ YOU:', me.id.slice(-4));
    });
    
    socket.on('newPlayer', p => {
      players.set(p.id, p);
    });
    
    socket.on('updatePlayer', (player) => {
      // 🎯 KEY FIX: Always trust server for ALL players
      players.set(player.id, player);
    });
    
    socket.on('removePlayer', id => {
      players.delete(id);
    });
    
    gameLoop();
  </script>
</body>
</html>
